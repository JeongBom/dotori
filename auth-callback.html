<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>도토리 - 이메일 인증</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #FDF6EC;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #FFF8F0;
      border-radius: 24px;
      padding: 48px 36px;
      text-align: center;
      max-width: 380px;
      width: 90%;
      box-shadow: 0 4px 24px rgba(139,94,60,0.12);
    }
    .emoji { font-size: 64px; margin-bottom: 20px; }
    h1 { font-size: 24px; font-weight: 800; color: #5C3D1E; margin-bottom: 12px; }
    p { font-size: 15px; color: #8B5E3C; line-height: 1.7; margin-bottom: 32px; }
    .btn {
      display: inline-block;
      background: #8B5E3C;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      padding: 14px 32px;
      border-radius: 14px;
      text-decoration: none;
      cursor: pointer;
    }
    .hint { font-size: 13px; color: #C49A6C; margin-top: 16px; }
    .debug { font-size: 11px; color: #C49A6C; margin-top: 12px; word-break: break-all; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">✅</div>
    <h1>인증이 완료되었습니다!</h1>
    <p>이메일 인증이 성공적으로 완료됐어요.<br />앱으로 돌아가서 계속 진행해주세요.</p>
    <a id="appBtn" href="dotori://" class="btn">앱으로 돌아가기</a>
    <p class="hint">버튼이 작동하지 않으면 앱에서<br />"인증 완료했어요" 버튼을 눌러주세요.</p>
  </div>
  <script>
    function buildDeepLink() {
      // PKCE flow: ?code=XXXXX (query param)
      var searchParams = new URLSearchParams(window.location.search);
      var code = searchParams.get('code');
      if (code) {
        return 'dotori://?code=' + encodeURIComponent(code);
      }

      // Implicit flow: #access_token=XXX&refresh_token=YYY&type=signup (fragment)
      var hash = window.location.hash.replace('#', '');
      if (hash) {
        var hashParams = new URLSearchParams(hash);
        var accessToken = hashParams.get('access_token');
        var refreshToken = hashParams.get('refresh_token');
        var type = hashParams.get('type') || 'signup';
        if (accessToken && refreshToken) {
          return 'dotori://#access_token=' + encodeURIComponent(accessToken)
               + '&refresh_token=' + encodeURIComponent(refreshToken)
               + '&type=' + encodeURIComponent(type);
        }
      }

      // 파라미터 없으면 그냥 앱만 열기 (앱 내 폴링 버튼으로 처리)
      return 'dotori://';
    }

    var deepLink = buildDeepLink();
    document.getElementById('appBtn').href = deepLink;

    // 500ms 후 자동으로 앱 열기 시도
    setTimeout(function() { window.location.href = deepLink; }, 500);
  </script>
</body>
</html>
